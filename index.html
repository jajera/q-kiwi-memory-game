<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Memory Game</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header>
            <h1 data-i18n="title">Kiwi Memory Game</h1>
            
            <div class="controls">
                <!-- Theme Selector -->
                <div class="control-group">
                    <label for="theme-selector" data-i18n="theme">Theme:</label>
                    <select id="theme-selector" aria-label="Select theme">
                        <option value="forest-green" data-i18n="forest-green">Forest Green</option>
                        <option value="tui-blue" data-i18n="tui-blue">Tui Blue</option>
                        <option value="sunset-orange" data-i18n="sunset-orange">Sunset Orange</option>
                    </select>
                </div>
                
                <!-- Language Toggle -->
                <div class="control-group">
                    <label for="language-selector" data-i18n="language">Language:</label>
                    <select id="language-selector" aria-label="Select language">
                        <option value="en" data-i18n="english">English</option>
                        <option value="mi" data-i18n="maori">Te Reo Māori</option>
                    </select>
                </div>
                
                <!-- Sound Toggle -->
                <div class="control-group">
                    <button id="sound-toggle" aria-label="Sound off. Click to unmute" aria-pressed="false" class="icon-button">
                        <span id="sound-icon">🔇</span>
                    </button>
                </div>
            </div>
            
            <div class="game-info">
                <div class="stats">
                    <span><span data-i18n="attempts">Attempts</span>: <span id="attempts" aria-live="polite">0</span></span>
                    <span><span data-i18n="matches">Matches</span>: <span id="matches" aria-live="polite">0</span>/8</span>
                </div>
                <button id="restart-btn" data-i18n="restart">Restart Game</button>
            </div>
        </header>

        <div class="game-board" role="grid" aria-label="Memory game board with 16 cards">
            <!-- Cards will be generated by JavaScript -->
        </div>
        
        <!-- Accessibility live region for game announcements -->
        <div class="sr-only" aria-live="polite" id="game-announcements"></div>
    </div>
    
    <footer>
        <p data-i18n="footer">A New Zealand themed memory game</p>
    </footer>

    <!-- Win Message Overlay -->
    <div id="win-message" class="hidden" aria-modal="true">
        <div class="win-content">
            <h2 data-i18n="win-heading">Ka pai! You matched them all!</h2>
            <p><span data-i18n="win-message">You found all matches in</span> <span id="final-attempts">0</span> <span data-i18n="attempts-label">attempts</span>.</p>
            <button id="play-again-btn" data-i18n="play-again">Play Again</button>
        </div>
    </div>

    <!-- Audio elements for sound effects -->
    <audio id="flip-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>
    <audio id="match-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>
    <audio id="win-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script src="./script.js"></script>
</body>
</html>
